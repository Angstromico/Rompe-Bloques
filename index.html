<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rompe Ladrillos</title>
    <link rel="icon" href="assets/img/Manuel.jpeg" type="icon">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #222;
            font-family: 'Arial', sans-serif;
            color: white;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 490px;
        }
        #pantallaJuego {
            display: block;
            border: 2px solid #444;
            background-color: #000;
        }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Let clicks pass through to canvas if needed, but menus will have pointer-events: auto */
        }
        .menu {
            background-color: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            pointer-events: auto;
            display: none;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 1px solid #555;
        }
        .menu h1 {
            margin: 0 0 10px 0;
            font-size: 2.5rem;
            color: #fff;
        }
        button {
            padding: 10px 25px;
            font-size: 1.2rem;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        button.secondary {
            background-color: #555;
        }
        button.secondary:hover {
            background-color: #666;
        }
        .sound-btn {
            font-size: 1rem;
        }
        img {
            display: none;
        }
        .fail {
            animation: color 1.5s infinite alternate;
        }
        @keyframes color {
            to {
                background-color: red;
            }
        }
        img #cuadro {
            opacity: 0;
        }
    </style>
</head>
<body id="body">
    <div id="game-container">
        <canvas id="pantallaJuego" width="800" height="490"></canvas>
        <div id="ui-overlay">
            <div id="start-menu" class="menu" style="display: flex;">
                <h1>Rompe Ladrillos</h1>
                <button id="start-button">Jugar</button>
                <button id="sound-toggle-start" class="secondary sound-btn">Sonido: ON</button>
            </div>
            <div id="pause-menu" class="menu">
                <h1>Pausa</h1>
                <button id="resume-button">Continuar</button>
                <button id="sound-toggle-pause" class="secondary sound-btn">Sonido: ON</button>
            </div>
            <div id="gameover-menu" class="menu">
                <h1>Fin del Juego</h1>
                <button id="restart-button">Reiniciar</button>
            </div>
        </div>
    </div>
    <audio data-song src="assets/sounds/coin.mp3" id="coin"></audio>
    <audio data-song src="assets/sounds/init.wav" id="init"></audio>
    <audio data-song src="assets/sounds/beaker.wav" id="beaker"></audio>
    <audio data-song src="assets/sounds/bombsiren.mp3" id="siren"></audio>
    <audio data-song src="assets/sounds/laser.wav" id="laser"></audio>
    <audio data-song src="assets/sounds/pink.mp3" id="pink"></audio>
    <audio src="assets/sounds/yes.wav" id="yes"></audio>
    <audio data-song src="assets/sounds/epicwrait.mp3" id="epic"></audio>
    <audio data-song src="assets/sounds/goinghigher.mp3" id="hight"></audio>
    <audio data-song src="assets/sounds/halfgame.mp3" id="shot"></audio>
    <audio data-song src="assets/sounds/piano.mp3" id="piano"></audio>
    <audio data-song src="assets/sounds/Lost-Jungle.mp3" id="jungla"></audio>
    <audio data-song src="assets/sounds/moonlight.mp3" id="luna"></audio>
    <audio data-song src="assets/sounds/rock.mp3" id="rock"></audio>
    <audio src="assets/sounds/Bad.mp3" id="bad"></audio>
    <img src="assets/img/creepy.png" alt="bola" id="balon">
    <img src="assets/img/descarga.png" alt="ladrillo" id="ladrillo">
    <img src="assets/img/square.png" alt="cuadro" id="cuadro">
    <script src="js/java.js" type="module"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</body>
</html>
